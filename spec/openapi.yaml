components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key or OAuth2 access token
    oauth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.harnlang.com/oauth/token
          scopes:
            sessions:read: Read Sessions.
            sessions:write: Create or mutate Sessions.
            tasks:read: Read Tasks.
            tasks:write: Submit or cancel Tasks.
            events:read: Read or stream Events.
            artifacts:read: Read Artifacts.
            artifacts:write: Register Artifacts.
            receipts:read: Read Receipts.

  parameters:
    ProtocolVersion:
      name: Harn-Agents-Protocol-Version
      in: header
      required: true
      description: Date-stamped Harn Agents Protocol version.
      schema:
        type: string
        enum: [agents-protocol-2026-04-25]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-generated key used to safely retry non-idempotent writes.
      schema:
        type: string
        minLength: 1
        maxLength: 255
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    AfterEventId:
      name: after_event_id
      in: query
      required: false
      schema:
        type: string
    LastEventId:
      name: Last-Event-ID
      in: header
      required: false
      description: SSE resume cursor.
      schema:
        type: string
    WorkspaceIdQuery:
      name: workspace_id
      in: query
      required: false
      schema:
        type: string
    SessionIdQuery:
      name: session_id
      in: query
      required: false
      schema:
        type: string
    TaskIdQuery:
      name: task_id
      in: query
      required: false
      schema:
        type: string
    PersonaId:
      name: persona_id
      in: path
      required: true
      schema:
        type: string
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
    BranchId:
      name: branch_id
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: message_id
      in: path
      required: true
      schema:
        type: string
    ArtifactId:
      name: artifact_id
      in: path
      required: true
      schema:
        type: string
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
    ReceiptId:
      name: receipt_id
      in: path
      required: true
      schema:
        type: string
    MemoryId:
      name: memory_id
      in: path
      required: true
      schema:
        type: string
    VaultId:
      name: vault_id
      in: path
      required: true
      schema:
        type: string
    ConnectorId:
      name: connector_id
      in: path
      required: true
      schema:
        type: string
    SkillId:
      name: skill_id
      in: path
      required: true
      schema:
        type: string
    OutcomeId:
      name: outcome_id
      in: path
      required: true
      schema:
        type: string
    QuotaId:
      name: quota_id
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Protocol error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    JsonValue:
      description: Any JSON value.
    Metadata:
      type: object
      additionalProperties: true
      default: {}
    Timestamp:
      type: string
      format: date-time
    ResourcePointer:
      type: object
      required: [object, id]
      properties:
        object:
          type: string
        id:
          type: string
    PageInfo:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: [string, "null"]
        has_more:
          type: boolean
    ResourceEnvelope:
      type: object
      required: [id, object, created_at, updated_at, metadata]
      properties:
        id:
          type: string
        object:
          type: string
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
        metadata:
          $ref: "#/components/schemas/Metadata"

    Discovery:
      type: object
      required: [object, protocol_family, current_version, supported_versions, capabilities]
      properties:
        object:
          type: string
          enum: [protocol_discovery]
        protocol_family:
          type: string
          enum: [harn_agents_protocol]
        current_version:
          type: string
          enum: [agents-protocol-2026-04-25]
        supported_versions:
          type: array
          items:
            type: string
        capabilities:
          type: object
          properties:
            rest:
              type: boolean
            sse:
              type: boolean
            websocket:
              type: boolean
            receipts:
              type: boolean
            replay:
              type: boolean

    Persona:
      allOf:
        - $ref: "#/components/schemas/ResourceEnvelope"
        - type: object
          required: [object, name, version, entry_workflow, description, autonomy_tier, receipt_policy]
          properties:
            object:
              type: string
              enum: [persona]
            name:
              type: string
            version:
              type: string
            entry_workflow:
              type: string
            description:
              type: string
            autonomy_tier:
              $ref: "#/components/schemas/AutonomyTier"
            receipt_policy:
              type: string
              enum: [required, optional, disabled]
            tools:
              type: array
              items:
                type: string
            capabilities:
              type: array
              items:
                type: string
            triggers:
              type: array
              items:
                $ref: "#/components/schemas/JsonObject"
            schedules:
              type: array
              items:
                $ref: "#/components/schemas/JsonObject"
            handoffs:
              type: array
              items:
                type: string
            context_packs:
              type: array
              items:
                type: string
            evals:
              type: array
              items:
                type: string
            owner:
              type: [string, "null"]
            model_policy:
              $ref: "#/components/schemas/JsonObject"
            rollout_policy:
              $ref: "#/components/schemas/JsonObject"
            quota_id:
              type: [string, "null"]
    PersonaList:
      allOf:
        - $ref: "#/components/schemas/PaginatedList"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Persona"
    CreatePersonaRequest:
      type: object
      required: [name, version, entry_workflow, description, autonomy_tier, receipt_policy]
      properties:
        module_ref:
          type: string
          description: Optional harn://owner/name@version module reference.
        name:
          type: string
        version:
          type: string
        entry_workflow:
          type: string
        description:
          type: string
        autonomy_tier:
          $ref: "#/components/schemas/AutonomyTier"
        receipt_policy:
          type: string
          enum: [required, optional, disabled]
        metadata:
          $ref: "#/components/schemas/Metadata"
    UpdatePersonaRequest:
      type: object
      properties:
        description:
          type: string
        receipt_policy:
          type: string
          enum: [required, optional, disabled]
        quota_id:
          type: [string, "null"]
        metadata:
          $ref: "#/components/schemas/Metadata"

    Workspace:
      allOf:
        - $ref: "#/components/schemas/ResourceEnvelope"
        - type: object
          required: [object, name, root, default_branch_id]
          properties:
            object:
              type: string
              enum: [workspace]
            name:
              type: string
            root:
              type: string
            default_branch_id:
              type: [string, "null"]
            host:
              type: [string, "null"]
            repository:
              type: [string, "null"]
            tenant_id:
              type: [string, "null"]
            capabilities:
              type: array
              items:
                type: string
            connectors:
              type: array
              items:
                type: string
            quota_id:
              type: [string, "null"]
    WorkspaceList:
      allOf:
        - $ref: "#/components/schemas/PaginatedList"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Workspace"
    CreateWorkspaceRequest:
      type: object
      required: [name, root]
      properties:
        name:
          type: string
        root:
          type: string
        image:
          type: [string, "null"]
        packages:
          type: array
          items:
            type: string
        network_policy:
          $ref: "#/components/schemas/JsonObject"
        sandbox_backend:
          type: [string, "null"]
        metadata:
          $ref: "#/components/schemas/Metadata"
    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        capabilities:
          type: array
          items:
            type: string
        quota_id:
          type: [string, "null"]
        metadata:
          $ref: "#/components/schemas/Metadata"

    Session:
      allOf:
        - $ref: "#/components/schemas/ResourceEnvelope"
        - type: object
          required: [object, workspace_id, state, transcript]
          properties:
            object:
              type: string
              enum: [session]
            workspace_id:
              type: string
            state:
              type: string
              enum: [ACTIVE, IDLE, PAUSED, CLOSED, FAILED]
            transcript:
              oneOf:
                - $ref: "#/components/schemas/JsonObject"
                - type: string
                  format: uri-reference
            persona_id:
              type: [string, "null"]
            root_session_id:
              type: [string, "null"]
            parent_session_id:
              type: [string, "null"]
            branch_id:
              type: [string, "null"]
            last_event_id:
              type: [string, "null"]
            summary:
              type: [string, "null"]
            expires_at:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
    SessionList:
      allOf:
        - $ref: "#/components/schemas/PaginatedList"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Session"
    CreateSessionRequest:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
        persona_id:
          type: [string, "null"]
        vault_ids:
          type: array
          items:
            type: string
        memory_ids:
          type: array
          items:
            type: string
        skill_ids:
          type: array
          items:
            type: string
        initial_messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageInput"
        metadata:
          $ref: "#/components/schemas/Metadata"
    UpdateSessionRequest:
      type: object
      properties:
        summary:
          type: [string, "null"]
        metadata:
          $ref: "#/components/schemas/Metadata"
    ForkSessionRequest:
      type: object
      properties:
        at_event_id:
          type: [string, "null"]
        branch_id:
          type: [string, "null"]
        metadata:
          $ref: "#/components/schemas/Metadata"

    Task:
      allOf:
        - $ref: "#/components/schemas/ResourceEnvelope"
        - type: object
          required: [object, session_id, workspace_id, status, input, created_by]
          properties:
            object:
              type: string
              enum: [task]
            session_id:
              type: string
            workspace_id:
              type: string
            status:
              $ref: "#/components/schemas/TaskStatus"
            input:
              oneOf:
                - $ref: "#/components/schemas/Message"
                - $ref: "#/components/schemas/JsonObject"
            created_by:
              type: string
            persona_id:
              type: [string, "null"]
            branch_id:
              type: [string, "null"]
            parent_task_id:
              type: [string, "null"]
              description: Source Task id for replay and delegated child Tasks, otherwise null.
            assigned_agent_id:
              type: [string, "null"]
            receipt_id:
              type: [string, "null"]
            outcome_id:
              type: [string, "null"]
            quota_id:
              type: [string, "null"]
            started_at:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            completed_at:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            canceled_at:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            failure:
              oneOf:
                - $ref: "#/components/schemas/Failure"
                - type: "null"
    TaskStatus:
      type: string
      enum: [SUBMITTED, WORKING, INPUT_REQUIRED, AUTH_REQUIRED, COMPLETED, FAILED, CANCELED]
    TaskList:
      allOf:
        - $ref: "#/components/schemas/PaginatedList"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Task"
    SubmitTaskRequest:
      type: object
      required: [input]
      properties:
        session_id:
          type: string
          description: Required on the top-level `/v1/tasks` submit path; inferred on nested Session paths.
        workspace_id:
          type: string
        persona_id:
          type: [string, "null"]
        branch_id:
          type: [string, "null"]
        parent_task_id:
          type: [string, "null"]
        input:
          oneOf:
            - $ref: "#/components/schemas/MessageInput"
            - $ref: "#/components/schemas/JsonObject"
        metadata:
          $ref: "#/components/schemas/Metadata"
    CancelTaskRequest:
      type: object
      properties:
        reason:
          type: [string, "null"]
    ReplayMode:
      type: string
      enum: [exact, with_overrides, from_checkpoint]
      description: |
        `exact` reuses only recorded event-log material, `with_overrides`
        applies explicit substitutions, and `from_checkpoint` resumes from a
        recorded checkpoint before replaying later events.
    ReplayTaskRequest:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/ReplayMode"
          default: exact
        override:
          type: object
          description: Map from stable override key to replacement replay material.
          additionalProperties:
            $ref: "#/components/schemas/ReplayOverride"
          default: {}
        checkpoint_id:
          type: [string, "null"]
          description: Required when `mode` is `from_checkpoint` unless `checkpoint_event_id` is supplied.
        checkpoint_event_id:
          type: [string, "null"]
          description: Event id of the checkpoint boundary for `from_checkpoint` replay.
        reason:
          type: [string, "null"]
        metadata:
          $ref: "#/components/schemas/Metadata"
      examples:
        - mode: with_overrides
          override:
            llm:main:1:
              kind: llm_provider_response
              event_id: event_01JZ7001
              value:
                id: chatcmpl_fixture_1
                choices:
                  - message:
                      role: assistant
                      content: Done.
              sha256: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    ReplayOverride:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum:
            - llm_provider_response
            - mcp_tool_return
            - secret_value
            - time
            - host_fact
            - tool_result
            - event_payload
            - checkpoint_value
        event_id:
          type: [string, "null"]
          description: Original EventLog event this override substitutes when known.
        target:
          type: [string, "null"]
          description: Stable dependency key such as a model call id, tool call id, secret name, or clock label.
        value:
          $ref: "#/components/schemas/JsonValue"
        artifact_id:
          type: [string, "null"]
          description: Artifact containing replacement material when the value is large or receipt-only.
        sha256:
          type: [string, "null"]
          pattern: "^sha256:[0-9a-f]{64}$"
        visibility:
          type: string
          enum: [public, internal, receipt_only]
          default: receipt_only
        reason:
          type: [string, "null"]
