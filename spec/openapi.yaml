            exhaustion_reason:
              type: [string, "null"]
            last_receipt_id:
              type: [string, "null"]
    QuotaList:
      allOf:
        - $ref: "#/components/schemas/PaginatedList"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Quota"

    AutonomyTier:
      type: string
      enum: [shadow, suggest, act_with_approval, act_auto]
    Failure:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          $ref: "#/components/schemas/JsonObject"
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
    Error:
      type: object
      required: [code, message, type]
      properties:
        code:
          type: string
          enum:
            - invalid_request
            - invalid_state_transition
            - unauthenticated
            - permission_denied
            - resource_not_found
            - conflict
            - idempotency_key_reused
            - cursor_expired
            - payload_too_large
            - policy_violation
            - resource_locked
            - unsupported_protocol_version
            - rate_limited
            - client_closed_request
            - internal_error
            - upstream_unavailable
            - service_unavailable
            - deadline_exceeded
        message:
          type: string
        type:
          type: string
          enum:
            - request_error
            - auth_error
            - permission_error
            - not_found_error
            - conflict_error
            - rate_limit_error
            - runtime_error
            - upstream_error
            - server_error
        param:
          type: [string, "null"]
        request_id:
          type: [string, "null"]
        details:
          $ref: "#/components/schemas/JsonObject"
    PaginatedList:
      type: object
      required: [object, data, page]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items: {}
        page:
          $ref: "#/components/schemas/PageInfo"
