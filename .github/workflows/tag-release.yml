name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag, with or without leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10.31.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate requested version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          REQUESTED="${{ inputs.version }}"
          REQUESTED="${REQUESTED#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$REQUESTED" != "$PACKAGE_VERSION" ]; then
            echo "Requested v$REQUESTED but package.json is v$PACKAGE_VERSION" >&2
            exit 1
          fi
          if git rev-parse "v$PACKAGE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$PACKAGE_VERSION already exists" >&2
            exit 1
          fi
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
      - run: pnpm typecheck
      - run: pnpm check:examples
      - run: pnpm check:tests
      - run: pnpm test
      - run: pnpm build
      - name: Push tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
