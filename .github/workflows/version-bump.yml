name: Version Bump PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "npm version argument when explicit_version is empty"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - prepatch
          - preminor
          - premajor
          - patch
          - minor
          - major
      preid:
        description: "Prerelease identifier for prerelease/prepatch/preminor/premajor"
        required: false
        default: alpha
        type: string
      explicit_version:
        description: "Optional exact semver version, for example 0.1.0-alpha.1"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Open Version Bump PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bump package version
        id: bump
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.explicit_version }}
          PREID: ${{ inputs.preid }}
        run: |
          set -euo pipefail
          if [ -n "${EXPLICIT_VERSION}" ]; then
            npm version "${EXPLICIT_VERSION}" --no-git-tag-version
          elif [[ "${BUMP}" == pre* || "${BUMP}" == "prerelease" ]]; then
            npm version "${BUMP}" --preid "${PREID}" --no-git-tag-version
          else
            npm version "${BUMP}" --no-git-tag-version
          fi
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: pnpm typecheck
      - run: pnpm check:examples
      - run: pnpm check:tests
      - run: pnpm test
      - run: pnpm build
      - name: Create release branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"
          # Use createCommitOnBranch so the release commit lands signed by
          # GitHub (the org-level required_signatures rule on `main` would
          # otherwise block auto-merge on the resulting PR).
          BASE_SHA="$(git rev-parse HEAD)"

          if gh api "repos/${REPO}/git/refs/heads/${BRANCH}" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${REPO}/git/refs/heads/${BRANCH}" \
              -f sha="${BASE_SHA}" -F force=true >/dev/null
          else
            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/heads/${BRANCH}" -f sha="${BASE_SHA}" >/dev/null
          fi

          PACKAGE_B64="$(base64 -w0 < package.json)"
          REQ_FILE="$(mktemp)"
          jq -n \
            --arg repo "${REPO}" \
            --arg branch "${BRANCH}" \
            --arg headline "chore: release v${VERSION}" \
            --arg oid "${BASE_SHA}" \
            --arg pkg "${PACKAGE_B64}" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: {repositoryNameWithOwner: $repo, branchName: $branch},
                  message: {headline: $headline},
                  fileChanges: {additions: [{path: "package.json", contents: $pkg}]},
                  expectedHeadOid: $oid
                }
              }
            }' > "${REQ_FILE}"

          gh api graphql --input "${REQ_FILE}" >/dev/null

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "Bumps @burin-labs/harn to v${VERSION}. After this PR merges, run the Create Release Tag workflow for v${VERSION}."
