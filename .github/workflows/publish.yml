name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for reruns only"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.31.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - name: Validate release metadata
        id: release
        run: node scripts/release-metadata.mjs --validate-tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      - run: pnpm typecheck
      - run: pnpm check:examples
      - run: pnpm check:tests
      - run: pnpm test
      - run: pnpm build
      - run: npm pack --dry-run
      - name: Publish package
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ steps.release.outputs.dist-tag }}
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN:-}" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance
